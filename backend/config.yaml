# ── Free AI Model Access Integration Layer Settings ─────────────────────────

# Ordered list of g4f sub-providers to rotate and fall back through
providers:
  - Bing
  - DeepInfra
  - You
  - ChatgptNext
  - Liaobots

# Model mappings (aliases mapped to underlying g4f model names)
models:
  gpt-4: gpt-4
  gpt-4o: gpt-4o
  gpt-4o-mini: gpt-4o-mini
  gpt-3.5-turbo: gpt-3.5-turbo
  claude-3-haiku: claude-3-haiku
  claude-3-opus: claude-3-opus

# Call retry and backoff options
retry_count: 5
initial_backoff: 1.0 # starting delay in seconds
max_backoff: 30.0 # maximum retry delay in seconds

# Rate Limiting: Minimum delay between successive provider requests
throttle_seconds: 0.5 # seconds to wait

# Response Caching Settings (TTL-based, in-memory)
cache:
  enabled: true
  ttl: 300 # time to live in seconds (5 minutes)
  max_size: 1000 # maximum capacity of cached responses

# Circuit Breaker settings for failed sub-providers
circuit_breaker:
  max_failures: 3 # consecutive errors before marking degraded
  cool_down_seconds: 300 # seconds to skip a degraded provider

# ── Multi-Channel Messaging ──────────────────────────────────────────────
channels:
  enabled:
    - telegram
    - whatsapp
    - discord
  telegram:
    enabled: true
  whatsapp:
    enabled: true
  discord:
    enabled: true
