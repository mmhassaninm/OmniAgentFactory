appId: com.catalyst.nexusos
productName: NexusOS
directories:
  output: build
files:
  - "src/main/**/*"
  - "src/preload/**/*"
  - "src/renderer/dist/**/*"
  - "package.json"
extraResources:
  - from: "src/python-daemons/dist/main.exe"
    to: "python-daemons/main.exe"
win:
  target: nsis
  icon: "build/icon.ico"
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
